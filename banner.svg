<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d0d2b"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d95"/>
      <stop offset="40%" style="stop-color:#ff00ff"/>
      <stop offset="60%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-subtle">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a3a" stroke-width="0.5"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <rect width="800" height="280" fill="url(#grid)" opacity="0.6"/>
  <rect width="800" height="280" fill="url(#scanlines)"/>

  <!-- Decorative circuit lines -->
  <g stroke="#ff00ff" stroke-width="0.5" opacity="0.15" fill="none">
    <path d="M 0 60 H 120 L 140 40 H 200"/>
    <path d="M 0 220 H 80 L 100 200 H 160 L 170 210 H 220"/>
    <path d="M 800 80 H 680 L 660 100 H 600"/>
    <path d="M 800 200 H 700 L 680 180 H 620 L 610 190 H 560"/>
    <circle cx="200" cy="40" r="2" fill="#ff00ff"/>
    <circle cx="220" cy="210" r="2" fill="#ff00ff"/>
    <circle cx="600" cy="100" r="2" fill="#00ffff"/>
    <circle cx="560" cy="190" r="2" fill="#00ffff"/>
  </g>
  <g stroke="#00ffff" stroke-width="0.5" opacity="0.12" fill="none">
    <path d="M 50 0 V 30 L 70 50 V 80"/>
    <path d="M 750 0 V 25 L 730 45 V 70"/>
    <path d="M 100 280 V 250 L 120 230 V 200"/>
    <path d="M 700 280 V 255 L 680 235 V 210"/>
  </g>

  <!-- Top accent line -->
  <rect x="150" y="0" width="500" height="1" fill="url(#neon)" opacity="0.6"/>

  <!-- Floating tech labels - left side -->
  <g font-family="'Courier New', monospace" opacity="0.2" fill="#00ffff" font-size="9">
    <text x="30" y="45">RUST_POWERED</text>
    <text x="20" y="105" fill="#ff00ff">ZERO_CONFIG</text>
    <text x="40" y="165">ANSI_256</text>
    <text x="25" y="245" fill="#ff00ff">BLAZING_FAST</text>
  </g>

  <!-- Floating tech labels - right side -->
  <g font-family="'Courier New', monospace" opacity="0.2" fill="#00ffff" font-size="9" text-anchor="end">
    <text x="770" y="45" fill="#ff00ff">UNICODE_NATIVE</text>
    <text x="780" y="105">BOX_DRAWING</text>
    <text x="760" y="165" fill="#ff00ff">PIPELINE_READY</text>
    <text x="775" y="245">TTY_AWARE</text>
  </g>

  <!-- Main title: mdcli -->
  <text x="400" y="130" text-anchor="middle"
        font-family="'Courier New', monospace" font-weight="bold" font-size="96"
        fill="url(#title)" filter="url(#glow-strong)" letter-spacing="8">
    mdcli
  </text>

  <!-- Subtitle glow bar -->
  <rect x="200" y="155" width="400" height="1" fill="url(#neon)" opacity="0.4" filter="url(#glow-subtle)"/>

  <!-- Tagline -->
  <text x="400" y="180" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="16"
        fill="#00ffff" filter="url(#glow)" opacity="0.9" letter-spacing="4">
    MARKDOWN IN YOUR TERMINAL
  </text>

  <!-- Tech badges row -->
  <g font-family="'Courier New', monospace" font-size="10" text-anchor="middle">
    <!-- Badge: RUST -->
    <rect x="195" y="205" width="70" height="22" rx="3" fill="none" stroke="#ff2d95" stroke-width="0.8" opacity="0.6"/>
    <text x="230" y="220" fill="#ff2d95" opacity="0.7" filter="url(#glow-subtle)">RUST</text>

    <!-- Badge: UNICODE -->
    <rect x="280" y="205" width="90" height="22" rx="3" fill="none" stroke="#ff00ff" stroke-width="0.8" opacity="0.6"/>
    <text x="325" y="220" fill="#ff00ff" opacity="0.7" filter="url(#glow-subtle)">UNICODE</text>

    <!-- Badge: ANSI -->
    <rect x="385" y="205" width="70" height="22" rx="3" fill="none" stroke="#00ffff" stroke-width="0.8" opacity="0.6"/>
    <text x="420" y="220" fill="#00ffff" opacity="0.7" filter="url(#glow-subtle)">ANSI</text>

    <!-- Badge: PAGER -->
    <rect x="470" y="205" width="75" height="22" rx="3" fill="none" stroke="#00ff88" stroke-width="0.8" opacity="0.6"/>
    <text x="507" y="220" fill="#00ff88" opacity="0.7" filter="url(#glow-subtle)">PAGER</text>
  </g>

  <!-- Version tag -->
  <text x="400" y="258" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#666688" letter-spacing="2">
    v0.1.0 // TERMINAL_FIRST // OPEN_SOURCE
  </text>

  <!-- Bottom accent line -->
  <rect x="150" y="279" width="500" height="1" fill="url(#neon)" opacity="0.6"/>
</svg>
